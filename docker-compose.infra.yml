# Optional local infrastructure (PostgreSQL + Redis) without the API container.
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: stockflow-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow}
      POSTGRES_DB: ${POSTGRES_DB:-stockflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stockflow} -d ${POSTGRES_DB:-stockflow_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: stockflow-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    name: stockflow_postgres_data
  redis_data:
    name: stockflow_redis_data
