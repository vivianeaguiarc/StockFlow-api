services:
  postgres:
    image: postgres:17-alpine
    container_name: stockflow-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow}
      POSTGRES_DB: ${POSTGRES_DB:-stockflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stockflow} -d ${POSTGRES_DB:-stockflow_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: stockflow-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3333}:3333'
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockflow}:${POSTGRES_PASSWORD:-stockflow}@postgres:5432/${POSTGRES_DB:-stockflow_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-7}
      CACHE_ENABLED: ${CACHE_ENABLED:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: stockflow_postgres_data
