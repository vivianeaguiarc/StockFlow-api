name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: stockflow
          POSTGRES_PASSWORD: stockflow
          POSTGRES_DB: stockflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockflow -d stockflow_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HUSKY: '0'
      NODE_ENV: test
      API_PREFIX: /api/v1
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgresql://stockflow:stockflow@localhost:5432/stockflow_db?schema=public
      JWT_SECRET: ci-fake-jwt-secret-do-not-use-in-production
      JWT_ACCESS_SECRET: ci-fake-jwt-access-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: ci-fake-jwt-refresh-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 7
      REDIS_URL: redis://localhost:6379
      CACHE_ENABLED: 'false'
      RATE_LIMIT_ENABLED: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Run database migrations
        run: pnpm exec prisma migrate deploy

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test coverage
        run: pnpm test:coverage
